env:
  DEBIAN__DOCKER_IMAGE__TAG__DATE: "20251208"
  NODE_JS__VERSION: "24.14.0"
jobs:
  release:
    name: "Release"
    outputs:
      release_version: "${{steps.remember_release_version.outputs.release_version}}"
    permissions:
      contents: "write"
      pull-requests: "write"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v6.0.2"
        with:
          fetch-depth: 0
      - name: "Setup Node.js"
        uses: "actions/setup-node@v6.3.0"
        with:
          cache: "npm"
          node-version: "${{env.NODE_JS__VERSION}}"
      - name: "Configure Git"
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
      - name: "Install the dependencies"
        run: |
          npm ci
      - name: "Release"
        env:
          GITHUB_TOKEN: "${{secrets.GITHUB_TOKEN}}"
        run: |
          npm run release-it -- --ci --verbose
      - id: "remember_release_version"
        name: "Remember the release version"
        run: |
          echo "release_version=$(npm pkg get version | tr -d '"')" >> $GITHUB_OUTPUT
name: "Releasing"
on:
  workflow_dispatch:
